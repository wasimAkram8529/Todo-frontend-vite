name: CD Pipeline for Infracture and Configuration Management, Deploy Frontend

on:
  workflow_dispatch:

jobs:
  create-aws-infrastructure:
    if: github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: production
    env:
      TF_VAR_aws-region: ${{ secrets.AWS_REGION }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure aws credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup terraform in runner
        uses: hashicorp/setup-terraform@v3

      - name: Initialialize terraform
        run: |
          terraform init \
          -backend-config="bucket=${{ secrets.AWS_REMOTE_BACKEND }}" \
          -backend-config="region=${{ secrets.AWS_REGION }}" \
          -backend-config="key=terraform/backend/terraform.tfstate"
        working-directory: infra/terraform

      - name: Generate tfplan file for review
        run: terraform plan -out tfplan
        working-directory: infra/terraform

      - name: Terraform Plan (Readable)
        run: terraform show -no-color tfplan
        working-directory: infra/terraform

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: infra/terraform/tfplan

  terraform-apply:
    if: github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: create-aws-infrastructure
    environment:
      name: production
    env:
      TF_VAR_aws-region: ${{ secrets.AWS_REGION }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Initialialize terraform
        run: |
          terraform init \
          -backend-config="bucket=${{ secrets.AWS_REMOTE_BACKEND }}" \
          -backend-config="region=${{ secrets.AWS_REGION }}" \
          -backend-config="key=terraform/backend/terraform.tfstate"
        working-directory: infra/terraform

      - name: Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan
          path: infra/terraform

      - name: Terraform Apply Approved Plan
        run: terraform apply -auto-approve tfplan
        working-directory: infra/terraform

  Ansible-run:
    if: github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: terraform-apply
    environment:
      name: production
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      ANSIBLE_REMOTE_USER: ${{ secrets.ANSIBLE_REMOTE_USER }}
      USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup python
        uses: actions/setup-python@v4
        with:
          python-version: "3.x"

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.AWS_SSH_PRIVATE_KEY }}" > ~/.ssh/Ansible_key.pem
          chmod 600 ~/.ssh/Ansible_key.pem

      - name: Install boto boto3 botocore Ansible
        run: |
          pip install ansible boto3 botocore

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # - name: Setup ansible variables
      #   run: |
      #     echo "ANSIBLE_USER=${{ secrets.ANSIBLE_USER }}" > $GITHUB_ENV
      #     echo "USERNAME=${{ secrets.DOCKER_USERNAME }}" > $GITHUB_ENV
      #     echo "DOCKER_PASSWORD=${{ secrets.DOCKER_PASSWORD }}" > $GITHUB_ENV
      #     echo "MONGO_URI=${{ secrets.MONGO_URI }}" > $GITHUB_ENV
      #     echo "PORT=${{ secrets.PORT }}" > $GITHUB_ENV

      - name: Run playbook
        run: |
          cd infra/ansible
          ansible-playbook playbook.yml
