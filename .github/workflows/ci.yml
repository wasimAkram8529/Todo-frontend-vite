name: "CI Pipeline for todo frontend"

on:
  push:
    branches:
      - main
      - develop

  pull_request:
    branches:
      - main
      - develop
    types:
      - opened
      - synchronize

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup nodejs
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependency
        run: npm ci

      - name: build project
        run: npm run build

      - name: Run tests
        run: npm run test

      - name: Run lint
        run: npm run lint

      - name: upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: react-build
          path: dist

      # - name: Send Email Notification
      #   if: success()
      #   uses: dawidd6/action-send-mail@v4
      #   with:
      #     server_address: smtp.gmail.com
      #     server_port: 465
      #     username: ${{secrets.EMAIL_USERNAME}}
      #     password: ${{secrets.EMAIL_PASSWORD}}
      #     subject: React App Build Successful
      #     to: ${{secrets.RECEIVER_EMAIL}}
      #     from: ${{secrets.EMAIL_USERNAME}}
      #     body: "Build job of ${{github.repository}} for Branch: ${{github.ref_name}}  completed successfully!"

  create-docker-image:
    if: github.ref == 'refs/heads/develop'
    needs: build-and-test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to docker hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Generate short sha key
        id: vars
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" > $GITHUB_ENV

      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/todo-frontend:staging-${{ env.SHORT_SHA }} .
